# whatismyip site configuration
# Copy this file to config.toml and edit it for your deployment.
# The application must be restarted to pick up changes.

[site]

# Your institution's display name.
# Used as the ISP/organization label when a visitor's IP is a private (RFC 1918)
# or campus address that cannot be looked up through the public geolocation API.
name = "State University of New York at Buffalo"

# Primary campus location — used as the geolocation fallback for private/campus IPs.
city = "Buffalo"
region = "New York"
country_code = "US"
country_name = "United States"
lat = 43.0010
lon = -78.7900

# Bing Webmaster Tools verification token.
# The 32-character hex token from your Bing Webmaster verification file.
# Leave empty ("") to omit the tag. Each institution gets its own token from
# https://www.bing.com/webmasters/
#bing_verification_token = ""

# IndexNow key — used to push URL change notifications to Bing (and other
# supporting search engines) immediately after a deploy, rather than waiting
# for the next crawl. Different from the verification token above.
# Generate a key at https://www.bing.com/webmasters/indexnow
# The key file is served automatically at /{key}.txt once set.
# To notify Bing of a changed page after deploying:
#   curl "https://api.indexnow.org/indexnow?url=https://yoursite.edu/about&key={key}&keyLocation=https://yoursite.edu/{key}.txt"
# indexnow_key = ""

[dns]

# URL of a page that your DNS security filtering service is known to block.
# The tool fetches this URL in the visitor's browser; a connection failure
# indicates filtering is active, a successful response indicates it is not.
# Leave empty ("") to disable the DNS security filtering test entirely.
#
# Examples by provider:
#   Akamai ETP:         "https://www.akamaietpphishingtest.com/"
#   Cisco Umbrella:     "https://internetbadguys.com/"
#   Cloudflare Gateway: "https://malware.testcategory.com/"
security_filter_test_url = ""

[map]

# Map provider for displaying IP and campus building locations.
# "leaflet" — free, uses OpenStreetMap tiles, no API key required (default)
# "google"  — uses Google Maps JavaScript API, requires FLASK_GOOGLE_MAPS_API_KEY
provider = "leaflet"

[connectivity]

# Targets tested on the /connectivity page. Each entry requires name, url, and type.
# type must be one of: "self" (this tool), "campus" (campus resource), "internet" (public site).
# description is optional but recommended.
#
# Tests run client-side from the visitor's browser — results reflect the visitor's
# network path, not the server's.

[[connectivity.targets]]
name = "What Is My IP"
url = "https://whatismyip-ncs-netapps-dev.apps.buffalo.edu/"
description = "This diagnostic tool — always should be reachable"
type = "self"

[[connectivity.targets]]
name = "UB Homepage"
url = "https://www.buffalo.edu/"
description = "UB main website"
type = "internet"

[[connectivity.targets]]
name = "Microsoft 365"
url = "https://m365.cloud.microsoft/"
description = "Microsoft 365"
type = "internet"

[[connectivity.targets]]
name = "Brightspace"
url = "https://ublearns.buffalo.edu/"
description = "UB Learns, powered by Brightspace, is the centrally supported Learning Management System (LMS) at the university."
type = "campus"


[[connectivity.targets]]
name = "Google"
url = "https://www.google.com/"
description = "General internet connectivity check"
type = "internet"

[[connectivity.targets]]
name = "IT Help Desk"
url = "https://ubuffalo.teamdynamix.com/TDClient/42/ITPortal/Home/"
description = "UBIT support and service portal on teamdynamix"
type = "campus"



[campus]

# CIDR blocks that are considered campus/local network addresses.
# Devices matching any of these networks receive full diagnostics including
# network/VLAN details and NAC information. Devices that do not match are
# treated as off-campus and receive only basic IP and geolocation information.
#
# Add your institution's public and private IP ranges here.
networks = [
    # Institution-owned public IP space
    "67.20.192.0/19",
    "69.12.16.0/21",
    "128.205.0.0/16",
    "2620:cc:8000::/48",

    # ISP-owned IP space
    "8.22.104.0/21",
    "8.35.160.0/20",
    "8.37.48.0/21",
    "38.95.240.0/20",
    "67.99.160.0/20",

    # Private IP space and other
    "10.0.0.0/8",
    "199.33.167.0/24",
    "199.110.242.0/25",
    "2620:f2:1002::/64",
]
